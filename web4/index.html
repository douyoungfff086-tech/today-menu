<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400,700&display=swap" rel="stylesheet">

<title>TODAY'S MEAL?</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#f2f2f0;
  font-family:'Space Mono', monospace;
}

/* background noise */
.bg-noise{
  position:fixed;
  inset:0;
  opacity:0.03;
  pointer-events:none;
  background-image:
  repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    black 3px
  );
}

/* left top small text */
.corner-code{
  position:absolute;
  top:60px;
  left:60px;
  font-size:12px;
  line-height:1.8;
  letter-spacing:2px;
  color:#777;
  z-index:10;
}

/* title */
.main-title{
  position:absolute;
  top:15%;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  text-align:center;
}

.main-title .row{
  display:block;
  font-size:95px;
  line-height:0.95;
  letter-spacing:-5px;
  color:#111;
}

/* sub title */
.sub{
  position:absolute;
  top:38%;
  left:50%;
  transform:translateX(-50%);
  font-size:16px;
  letter-spacing:4px;
  color:#555;
}

/* bottom left */
.desc{
  position:absolute;
  bottom:60px;
  left:60px;
  font-size:15px;
  line-height:1.9;
  color:#666;
}

/* top right */
.scan-text{
  position:absolute;
  top:60px;
  right:60px;
  font-size:13px;
  line-height:1.9;
  text-align:right;
  color:#555;
}

/* bottom right */
.target{
  position:absolute;
  bottom:60px;
  right:60px;
  font-size:13px;
  letter-spacing:3px;
  color:#777;
}

.check-wrap{
  position:absolute;
  top:65%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:30;
  width:280px;
  text-align:left;
}
.check-item{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  margin-bottom:22px;
  cursor:pointer;
  font-size:15px;
  letter-spacing:1px;
  width:100%;
}
.check-box{
  min-width:18px;
  height:18px;
  border:1.5px solid #111;
  margin-right:14px;
  flex-shrink:0;
}
.check-box.on{
  background:#111;
}

.confirm-btn{
  display:block;
  width:100%;
  margin-top:28px;
  padding:12px 20px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:999px;
  font-family:'Space Mono', monospace;
  letter-spacing:3px;
  cursor:pointer;
  transition:0.2s;
  text-align:center;
}
.confirm-btn:disabled{
  background:#888;
  cursor:not-allowed;
}
.confirm-btn:hover:not(:disabled){
  background:#333;
}

.transition{
  position:fixed;
  inset:0;
  background:#f2f2f0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:0.8s ease;
  z-index:99999;
}
.transition.show{
  opacity:1;
}
.loading-text{
  font-size:22px;
  letter-spacing:6px;
  color:#111;
  margin-top:30px;
}
.loading-line{
  width:240px;
  height:2px;
  background:#ddd;
  overflow:hidden;
  position:relative;
}
.loading-line::after{
  content:"";
  position:absolute;
  left:-100%;
  top:0;
  width:100%;
  height:100%;
  background:#111;
  animation:loading 1s linear infinite;
}
@keyframes loading{
  0%{ left:-100%; }
  100%{ left:100%; }
}
</style>
</head>

<body>
<div class="bg-noise"></div>

<div class="corner-code">
  RANDOM FOOD MENU
</div>

<h1 class="main-title">
  <span class="row">TODAY'S</span>
  <span class="row">MEAL?</span>
</h1>

<div class="sub">
  HOW DO YOU FEEL TODAY?
</div>

<div class="desc">
  SELECT YOUR CONDITION<br>
  GET RECOMMENDED MENU
</div>

<div class="scan-text">
  STATUS : READY<br>
  TARGET : MOOD SELECT<br>
  MODE : RECOMMEND
</div>

<!-- 已修改为 PICKER -->
<div class="target">
  PICKER
</div>

<div class="check-wrap">
  <div class="check-item" data-val="1">
    <div class="check-box"></div>
    <span>LOW ENERGY</span>
  </div>
  <div class="check-item" data-val="2">
    <div class="check-box"></div>
    <span>HAPPY</span>
  </div>
  <div class="check-item" data-val="3">
    <div class="check-box"></div>
    <span>NEED QUICK MEAL</span>
  </div>
  <div class="check-item" data-val="4">
    <div class="check-box"></div>
    <span>SEEKING COMFORT</span>
  </div>

  <button class="confirm-btn" disabled>GET RECOMMENDATION</button>
</div>

<div class="transition" id="transition">
  <div class="loading-line"></div>
  <div class="loading-text">LOADING...</div>
</div>

<script>
let selectMood = null;
const items = document.querySelectorAll('.check-item');
const btn = document.querySelector('.confirm-btn');

items.forEach(item=>{
  item.addEventListener('click',()=>{
    items.forEach(i=>i.querySelector('.check-box').classList.remove('on'));
    item.querySelector('.check-box').classList.add('on');
    selectMood = item.dataset.val;
    btn.disabled = false;
  })
})

btn.addEventListener('click',()=>{
  const trans = document.getElementById('transition');
  trans.classList.add('show');
  
  setTimeout(()=>{
    if(selectMood == 1){
      location.href = "ticket1.html";
    } else if(selectMood == 2){
      location.href = "ticket2.html";
    } else if(selectMood == 3){
      location.href = "ticket3.html";
    } else if(selectMood == 4){
      location.href = "ticket4.html";
    }
  },1800)
})
</script>

</body>
</html>
