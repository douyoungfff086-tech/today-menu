<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400,700&display=swap" rel="stylesheet">

<title>TODAY'S RECOMMENDATION</title>

<style>

/* reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  min-height:100vh;
  overflow:hidden;
  background:#f5f1ea;
  font-family:'Space Mono', monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#111;
  padding:30px 0;
}

/* noise */
body::before{
  content:"";
  position:fixed;
  inset:0;
  opacity:0.03;
  background-image:
  repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    black 3px
  );
  pointer-events:none;
}

/* title */
.top-text{
  margin-bottom:20px;
  text-align:center;
}

.top-text h1{
  font-size:22px;
  letter-spacing:6px;
  margin-bottom:8px;
}

.top-text p{
  font-size:11px;
  opacity:0.5;
  letter-spacing:3px;
}

/* machine 高度大幅加高，彻底防止重叠 */
.machine{
  width:410px;
  height:600px; /* 核心：加高机身 */
  background:#d9d9d9;
  border-radius:26px;
  position:relative;
  box-shadow:0 26px 50px rgba(0,0,0,0.13);
  border:1px solid rgba(0,0,0,0.08);
  margin-bottom:28px;
}

/* top panel */
.machine-top{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  width:240px;
  height:46px;
  border-radius:10px;
  background:#2b2b2b;
}

/* slot */
.printer-slot{
  position:absolute;
  top:102px;
  left:50%;
  transform:translateX(-50%);
  width:272px;
  height:20px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

/* ticket 美观修长 + 绝对不重叠 */
.ticket{
  position:absolute;
  top:118px;
  left:50%;
  transform:translateX(-50%);
  width:212px;
  height:0;
  background:#fff;
  overflow:hidden;
  border-radius:0 0 10px 10px;
  transition:height 1.6s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 15px 30px rgba(0,0,0,0.14);
  cursor:pointer;
}

/* 小票打印高度（修长好看） */
.ticket.print{
  height:460px;
}

/* 图片不变形 */
.paper{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#ffffff;
  opacity:0;
  transition:1s ease;
}
.paper.show{
  opacity:1;
}

/* tear animation */
.ticket.tear{
  animation:tear .4s ease;
}
@keyframes tear{
  0%{transform:translateX(-50%) rotate(0deg);}
  25%{transform:translateX(-52%) rotate(-2deg);}
  50%{transform:translateX(-48%) rotate(2deg);}
  75%{transform:translateX(-51%) rotate(-1deg);}
  100%{transform:translateX(-50%) rotate(0deg);}
}

/* buttons group */
.btn-group{
  display:flex;
  gap:16px;
  margin-top:10px;
}

/* 精致小按钮 */
.print-btn, .all-btn{
  padding:12px 32px;
  border:none;
  background:#1a1a1a;
  color:#fff;
  border-radius:999px;
  cursor:pointer;
  font-family:'Space Mono', monospace;
  letter-spacing:3px;
  font-size:12px;
  transition:0.25s ease;
}
.print-btn:hover,
.all-btn:hover{
  transform:translateY(-2px);
  background:#333;
}

/* status text */
.status{
  margin-top:20px;
  font-size:12px;
  opacity:0.5;
  letter-spacing:2px;
  text-transform: uppercase;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.88);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.5s ease;
  z-index:9999;
}
.modal.show{
  opacity:1;
  pointer-events:auto;
}
.modal img{
  width:75vw;
  max-height:88vh;
  object-fit:contain;
  border-radius:12px;
}
.close{
  position:absolute;
  top:35px;
  right:50px;
  font-size:52px;
  color:white;
  cursor:pointer;
}

/* mobile */
@media(max-width:768px){
  .machine{transform:scale(0.75);}
}

</style>
</head>

<body>

<!-- title -->
<div class="top-text">
  <h1>TODAY'S RECOMMENDATION</h1>
  <p>RANDOM FOOD ARCHIVE SYSTEM</p>
</div>

<!-- machine -->
<div class="machine">
  <div class="machine-top"></div>
  <div class="printer-slot"></div>
  <div class="ticket" id="ticket">
    <img id="ticketImage" class="paper">
  </div>
</div>

<!-- buttons 跳转已改为 card.html -->
<div class="btn-group">
  <button class="print-btn" onclick="printTicket()">VIEW RESULT</button>
  <button class="all-btn" onclick="location.href='card.html'">VIEW ALL MENU</button>
</div>

<div class="status">
  CLICK RECEIPT TO VIEW IMAGE
</div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">×</div>
  <img id="modalImage">
</div>

<audio id="printSound" src="print.mp3">
<audio id="tearSound" src="tear.mp3">

<script>
const images = [
"1.png","2.png","3.png","4.png","5.png"
];

let currentImage = "";

function printTicket(){
  const ticket = document.getElementById("ticket");
  const img = document.getElementById("ticketImage");
  const printSound = document.getElementById("printSound");

  ticket.classList.remove("print");
  ticket.classList.remove("tear");
  img.classList.remove("show");

  void ticket.offsetWidth;

  currentImage = images[Math.floor(Math.random()*images.length)];
  img.src = currentImage;

  printSound.currentTime = 0;
  printSound.play();

  setTimeout(()=>ticket.classList.add("print"),150);
  setTimeout(()=>img.classList.add("show"),1200);
}

document.getElementById("ticket").addEventListener("click",()=>{
  if(!currentImage) return;
  const ticket = document.getElementById("ticket");
  const tearSound = document.getElementById("tearSound");
  ticket.classList.add("tear");
  tearSound.currentTime = 0;
  tearSound.play();
  setTimeout(()=>{
    document.getElementById("modal").classList.add("show");
    document.getElementById("modalImage").src = currentImage;
  },250);
});

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}
</script>

</body>
</html>
